<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} — Legado San José</title>
    <meta name="description" content="{{DESCRIPTION_SHORT}}">

    <!-- Meta tags para preview en redes sociales (Facebook, WhatsApp, Twitter) -->
    <meta property="og:type" content="product">
    <meta property="og:title" content="{{NAME}} — Legado San José">
    <meta property="og:description" content="{{DESCRIPTION_SHORT}}">
    <meta property="og:image" content="{{IMAGE_ABS}}">
    <meta property="og:url" content="{{PAGE_URL}}">
    <meta property="og:locale" content="es_MX">
    <meta property="product:price:amount" content="{{PRICE}}">
    <meta property="product:price:currency" content="MXN">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{NAME}} — Legado San José">
    <meta name="twitter:description" content="{{DESCRIPTION_SHORT}}">
    <meta name="twitter:image" content="{{IMAGE_ABS}}">
    <link rel="canonical" href="https://www.legadosanjose.com/productos">

    <!-- Redirige humanos a /productos con el modal abierto.
         Los bots/scrapers se quedan con los meta tags de arriba y nunca corren el JS. -->
    <meta http-equiv="refresh" content="0; url=/productos?p={{SLUG_URLSAFE}}">
    <script>window.location.replace('/productos?p={{SLUG_URLSAFE}}');</script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff; color: #888;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    </style>
</head>

<body>
    <p>Cargando <a href="/productos?p={{SLUG_URLSAFE}}">{{NAME}}</a>…</p>
</body>

</html>
